<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>
</head>
<body>

<h2>Edit Product</h2>

<form method="POST">

    <input
        type="text"
        id="editProductName"
        name="name"
        value="{{ product.name }}"
        required>

    <br><br>

    <input
    type="text"
    id="editProductCategory"
    name="category"
    value="{{ product.category }}"
    required>

    <br><br>

    <input
        type="text"
        id="editProductImage"
        name="image"
        value="{{ product.image }}"
        required>

    <br><br>

    <input
        type="number"
        id="editProductPrice"
        name="price"
        value="{{ product.price }}">

    <br><br>

    <button
        type="submit"
        id="updateProductBtn">

        Update Product

    </button>

</form>

</body>
</html>
